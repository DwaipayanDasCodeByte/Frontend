<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
    <style>
        body{
            background-color: yellow;
        }
       
        .logo{
            width: 40px;
            height: 40px;
          /* background-color: red; */
        }

        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .right ul{
            font-size: 20px;
            
            display: flex;
            gap: 20px;
        }
        .right{
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo-1.png" alt="logo" style="width: 189px; height: 72px;">
            </div>
            <div class="right">

                <ul style="list-style: none;">
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                    <li>Services</li>
                    <li>Projects</li>
                </ul>

            </div>
        </nav>
    </header>

</body>

</html>
