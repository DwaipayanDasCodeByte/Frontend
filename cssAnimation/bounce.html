<!DOCTYPE html lang="en">
<html>

<head>
    <title>Bounce Animation</title>
    <style>
        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: red;
            width: 80vw;
            height: 80vh;
        }

        .ball {
            margin-left: 25px;
            background-color: blue;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            animation: bouncingX 1s ease-out infinite  , bouncingY 1s ease-out infinite alternate;

        }

        @keyframes bouncingY {
            from {
                transform: translateY(-290px);
            }

            to {
                transform: translateY(349px);
            }

        }

        @keyframes bouncingX {

            from {
                transform: translateX(-290px);
            }

            to {
                transform: translateX(349px);
            }

        }
    </style>
</head>

<body>
    <div class="box">
        <div class="ball">

        </div>
    </div>
</body>

</html>
